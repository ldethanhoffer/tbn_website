<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-brand-title>Events</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <div data-layout="header"></div>

    <main class="container">
      <section class="page-intro">
        <h1>Events</h1>
        <p class="muted">
          Keep this page updated with your upcoming activities, meetings, and public events.
        </p>
      </section>

      <section class="events-month" aria-label="Events calendar">
        <div class="events-month-header">
          <h2 class="events-month-title" id="events-month-title">Upcoming events</h2>
        </div>

        <div class="events-calendar-grid" id="events-calendar-grid" aria-label="Calendar days"></div>
      </section>
    </main>

    <div data-layout="footer"></div>

    <script>
      (() => {
        const now = new Date();
        now.setHours(0, 0, 0, 0);

        const start = new Date(now);
        const targetCount = 15;
        const maxLookaheadDays = 730; // safety cap in case there aren't many events

        const MONTH_NAMES = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];
        const MONTH_LABELS = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

        const pad2 = (n) => String(n).padStart(2, '0');
        const isoKey = (y, mIndex, d) => `${y}-${pad2(mIndex + 1)}-${pad2(d)}`;

        const supportVenue = {
          label: '519 Church Street, Toronto, ON',
          href: 'https://maps.google.com/?q=519+Church+Street,+Toronto,+ON',
        };

        const brunchVenue = {
          label: 'The Bishop & Belcher',
          href:
            'https://maps.google.com/?q=The+Bishop+and+Belcher,+175+Bloor+St+E,+Toronto,+ON',
        };

        const nthWeekdayInMonth = ({ year, monthIndex, weekday, nth }) => {
          // JS weekday: 0=Sun ... 2=Tue ... 4=Thu ... 6=Sat
          const firstOfMonth = new Date(year, monthIndex, 1);
          const firstOffset = (weekday - firstOfMonth.getDay() + 7) % 7;
          const day = 1 + firstOffset + (nth - 1) * 7;
          const daysInMonth = new Date(year, monthIndex + 1, 0).getDate();
          return day <= daysInMonth ? day : null;
        };

        const getEventsForDate = (date) => {
          const year = date.getFullYear();
          const monthIndex = date.getMonth();
          const dayOfMonth = date.getDate();

          const events = [];

          // Fixed events in May.
          if (monthIndex === 4 && dayOfMonth === 3) {
            events.push({ title: 'TBN @ Pride', meta: '10:00 AM' });
          }
          if (monthIndex === 4 && dayOfMonth === 22) {
            events.push({ title: 'Social Mixers', meta: '9:00 AM' });
          }

          // Recurring: Brunch Club = 2nd Sunday.
          const secondSunday = nthWeekdayInMonth({ year, monthIndex, weekday: 0, nth: 2 });
          if (secondSunday && dayOfMonth === secondSunday) {
            events.push({
              title: 'Brunch Club',
              meta: '12pm-2pm',
              address: brunchVenue,
            });
          }

          // Support groups (from `src/siteConfig.js` schedules).
          const thirdThursday = nthWeekdayInMonth({ year, monthIndex, weekday: 4, nth: 3 });
          if (thirdThursday && dayOfMonth === thirdThursday) {
            events.push({
              title: 'General Support Group',
              meta: '7:30 - 8:30 PM',
              address: supportVenue,
            });
          }

          const firstThursday = nthWeekdayInMonth({ year, monthIndex, weekday: 4, nth: 1 });
          if (firstThursday && dayOfMonth === firstThursday) {
            events.push({
              title: "Women's Support Group",
              meta: '8:00 - 9:30 PM',
              address: supportVenue,
            });
          }

          const fourthTuesday = nthWeekdayInMonth({ year, monthIndex, weekday: 2, nth: 4 });
          if (fourthTuesday && dayOfMonth === fourthTuesday) {
            events.push({
              title: "Men's Support Group",
              meta: '7:00 - 8:30 PM',
              address: supportVenue,
            });
          }

          return events;
        };

        const gridEl = document.getElementById('events-calendar-grid');
        if (!gridEl) return;

        // Remove existing tiles (in case of hot reload).
        gridEl.replaceChildren();

        const titleEl = document.getElementById('events-month-title');

        // Collect the next N event occurrences starting today.
        const upcomingEvents = [];
        for (let offset = 0; offset <= maxLookaheadDays && upcomingEvents.length < targetCount; offset += 1) {
          const current = new Date(start);
          current.setDate(current.getDate() + offset);

          const dayEvents = getEventsForDate(current);
          if (dayEvents.length === 0) continue;

          for (const e of dayEvents) {
            upcomingEvents.push({ date: new Date(current), ...e });
            if (upcomingEvents.length >= targetCount) break;
          }
        }

        // Keep the header static ("Upcoming events"); no dynamic "Next 15" copy.

        // Render one tile per event occurrence.
        upcomingEvents.forEach((evt) => {
          const year = evt.date.getFullYear();
          const monthIndex = evt.date.getMonth();
          const dayOfMonth = evt.date.getDate();

          const key = isoKey(year, monthIndex, dayOfMonth);

          const tile = document.createElement('article');
          tile.className = 'calendar-day-tile';
          tile.setAttribute('data-day', String(dayOfMonth));
          tile.setAttribute('data-date', key);

          const badge = document.createElement('div');
          badge.className = 'calendar-day-badge';
          badge.setAttribute('aria-hidden', 'true');

          const badgeDay = document.createElement('span');
          badgeDay.className = 'calendar-day-number';
          badgeDay.textContent = pad2(dayOfMonth);

          const badgeMonth = document.createElement('span');
          badgeMonth.className = 'calendar-day-month';
          badgeMonth.textContent = MONTH_NAMES[monthIndex];

          badge.appendChild(badgeDay);
          badge.appendChild(badgeMonth);

          const body = document.createElement('div');
          body.className = 'calendar-day-body';

          const h3 = document.createElement('h3');
          h3.className = 'calendar-day-title';
          h3.textContent = evt.title;

          const meta = document.createElement('p');
          meta.className = 'calendar-day-meta muted';
          meta.textContent = evt.meta;

          body.appendChild(h3);
          body.appendChild(meta);

          if (evt.description) {
            const desc = document.createElement('p');
            desc.className = 'calendar-day-desc muted';
            desc.textContent = evt.description;
            body.appendChild(desc);
          }

          if (evt.address?.href && evt.address?.label) {
            const addr = document.createElement('p');
            const a = document.createElement('a');
            a.className = 'address-link';
            a.href = evt.address.href;
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
            a.innerHTML =
              '<span class="address-icon" aria-hidden="true">📍</span>' + evt.address.label;
            addr.appendChild(a);
            body.appendChild(addr);
          }

          tile.appendChild(badge);
          tile.appendChild(body);
          gridEl.appendChild(tile);
        });
      })();
    </script>
    <script type="module" src="./src/site.js"></script>
  </body>
</html>
