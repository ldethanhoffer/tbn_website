<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-brand-title>Home</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <div data-layout="header"></div>

    <section class="home-banner" aria-label="Pride banner">
      <img
        src="./assets/banner_3.png"
        alt="Toronto banner"
        class="home-banner-image"
        loading="eager"
      />
    </section>

    <main class="container">
      <section class="hero">
        <h1 class="hero-title" data-hero-title></h1>
        <p class="hero-subtitle" data-home-hero-subtitle></p>
        <div class="hero-actions">
          <a class="button" href="#" data-home-events-cta></a>
        </div>
      </section>

      <section class="card-grid" aria-label="Highlights" data-home-highlights></section>
    </main>

    <div data-layout="footer"></div>

    <script type="module" src="./src/site.js"></script>
  </body>
</html>
