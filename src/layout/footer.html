<footer class="site-footer">
  <div class="container footer-inner">
    <img
      class="footer-tbn-logo"
      src="./assets/tbn_logo_with_text.png"
      width="260"
      height="60"
      alt="TBN logo"
      aria-hidden="true"
    />
    <p class="muted footer-social">
      <a
        class="address-link"
        href="https://www.instagram.com/torontobinet/"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Instagram"
        title="Instagram"
      >
        <img
          src="./assets/instagram_logo.png"
          width="36"
          height="36"
          alt=""
          aria-hidden="true"
          class="instagram-logo-img"
          style="display: block;"
        />
      </a>

      <a
        class="address-link"
        href="https://www.facebook.com/TorontoBiNet/"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Facebook"
        title="Facebook"
      >
        <img
          src="./assets/facebook_logo.png"
          width="36"
          height="36"
          alt=""
          aria-hidden="true"
          class="facebook-logo-img"
          style="display: block;"
        />
      </a>
    </p>
    <p class="muted">
      &copy; <span data-year></span> <span data-brand>Brand</span>.
    </p>
    <p class="placeholder-note" id="contact-placeholder-note" hidden>
      Update the contact email in <code>src/siteConfig.js</code>.
    </p>
  </div>
</footer>
