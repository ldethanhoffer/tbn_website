<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-brand-title></title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body data-support-group="general">
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="index.html" data-brand>Brand</a>
        <nav class="nav" aria-label="Primary navigation">
          <a href="index.html">Home</a>
          <a href="about.html">About</a>
          <a href="people.html">People</a>
          <a href="events.html">Events</a>
          <div class="nav-dropdown" data-nav-dropdown="support-groups">
            <button
              type="button"
              class="nav-dropdown-toggle"
              aria-expanded="false"
              aria-haspopup="true"
              aria-controls="nav-menu-support-groups"
              id="nav-menu-support-groups-button"
            >
              Support Groups
            </button>
            <ul
              id="nav-menu-support-groups"
              class="nav-dropdown-menu"
              role="menu"
              aria-labelledby="nav-menu-support-groups-button"
              hidden
              data-support-groups-nav
            ></ul>
          </div>
          <a href="pride.html">Pride</a>
        </nav>
        <a class="contact-link button" href="#" data-contact-link>Contact</a>
      </div>
    </header>

    <main class="container">
      <div class="support-groups-page-with-banner">
        <aside class="support-group-quote-banner" aria-label="Quote">
          <blockquote data-sg="quote-block">
            <p data-sg="quote-text"></p>
            <footer data-sg="quote-attribution"></footer>
          </blockquote>
        </aside>

        <div class="support-groups-intro-row">
          <section class="page-intro">
            <div class="support-group-hover-preview-inner muted">
              <h1 class="support-group-preview-title" data-sg="intro-heading"></h1>
              <p data-sg="intro-paragraph"></p>
            </div>
          </section>

          <div class="support-groups-previews-column">
            <div class="support-group-hover-preview" data-sg="meeting-root">
              <div class="support-group-hover-preview-inner muted">
                <h3 class="support-group-preview-title" data-sg="meeting-heading"></h3>
                <div data-sg="meeting-paragraphs"></div>
              </div>
            </div>
          </div>

          <aside
            class="support-groups-what-to-expect-column"
            data-sg="what-to-expect-column"
            aria-labelledby="what-to-expect-heading-general"
          >
            <div class="support-group-hover-preview-inner muted">
              <h3 class="support-group-preview-title" data-sg="what-to-expect-heading"></h3>
              <p data-sg="what-to-expect-paragraph"></p>
            </div>

            <div class="support-group-detail-card-wrap">
              <section
                class="card-grid card-grid--align-start card-grid--single support-group-detail-card-grid"
                aria-label="Support group details"
              >
                <article class="card support-group-anchor" data-sg="card-article">
                  <h2 data-sg="card-heading"></h2>
                  <p class="muted" data-sg="card-schedule"></p>
                  <p>
                    <a class="address-link" data-sg="card-address-link" href="#" target="_blank" rel="noopener noreferrer"></a>
                  </p>
                </article>
              </section>
            </div>
          </aside>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <p class="muted">
          &copy; <span data-year></span> <span data-brand>Brand</span>.
        </p>
        <p class="placeholder-note" id="contact-placeholder-note" hidden>
          Update the contact email in <code>src/siteConfig.js</code>.
        </p>
      </div>
    </footer>

    <script type="module" src="./src/site.js"></script>
  </body>
</html>
