<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-brand-title></title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body data-support-group="womens">
    <div data-layout="header"></div>

    <main class="container">
      <div class="support-groups-page-with-banner">
        <aside class="support-group-quote-banner" aria-label="Quote">
          <blockquote data-sg="quote-block">
            <p data-sg="quote-text"></p>
            <footer data-sg="quote-attribution"></footer>
          </blockquote>
        </aside>

        <div class="support-groups-intro-row">
          <section class="page-intro">
            <div class="support-group-hover-preview-inner muted">
              <h1 class="support-group-preview-title" data-sg="intro-heading"></h1>
              <p data-sg="intro-paragraph"></p>
            </div>
          </section>

          <div class="support-groups-previews-column">
            <div class="support-group-hover-preview" data-sg="meeting-root">
              <div class="support-group-hover-preview-inner muted">
                <h3 class="support-group-preview-title" data-sg="meeting-heading"></h3>
                <div data-sg="meeting-paragraphs"></div>
              </div>
            </div>
          </div>

          <aside
            class="support-groups-what-to-expect-column"
            data-sg="what-to-expect-column"
            aria-labelledby="what-to-expect-heading-womens"
          >
            <div class="support-group-hover-preview-inner muted">
              <h3 class="support-group-preview-title" data-sg="what-to-expect-heading"></h3>
              <p data-sg="what-to-expect-paragraph"></p>
            </div>

            <div class="support-group-detail-card-wrap">
              <section
                class="card-grid card-grid--align-start card-grid--single support-group-detail-card-grid"
                aria-label="Support group details"
              >
                <article class="card support-group-anchor" data-sg="card-article">
                  <h2 data-sg="card-heading"></h2>
                  <p class="muted" data-sg="card-schedule"></p>
                  <p>
                    <a class="address-link" data-sg="card-address-link" href="#" target="_blank" rel="noopener noreferrer"></a>
                  </p>
                </article>
              </section>
            </div>
          </aside>
        </div>
      </div>
    </main>

    <div data-layout="footer"></div>

    <script type="module" src="./src/site.js"></script>
  </body>
</html>
